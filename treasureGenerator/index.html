
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathfinder 2e Treasure Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            text-align: center;
        }

        a {
            display: inline-block;
            margin-bottom: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        .input-group {
            margin: 12px 0;
        }

        label {
            font-weight: bold;
            margin-right: 8px;
        }

        input {
            padding: 8px;
            font-size: 16px;
            width: 90px;
            text-align: center;
        }

        #generate-btn {
            padding: 12px 24px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }

        #random-name {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }

        #treasure-output {
            margin: 25px auto 0;
            max-width: 700px;
            text-align: left;
            font-size: 18px;
            line-height: 1.5;
            border: 1px solid #ccc;
            padding: 18px;
            border-radius: 8px;
            background: #fafafa;
        }

        #treasure-output h2 {
            margin-top: 0;
            text-align: center;
        }

        #treasure-output ul {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <a href="../">⬅ Back to Main Menu</a>
    <h1>Pathfinder 2e Treasure Generator</h1>

    <div class="input-group">
        <label for="party-level">Party Level:</label>
        <input id="party-level" type="number" min="1" max="20" value="1">
    </div>

    <div class="input-group">
        <label for="party-size">Party Members:</label>
        <input id="party-size" type="number" min="1" max="8" value="4">
    </div>

    <button id="generate-btn">Generate Treasure</button>

    <div id="treasure-output">
        <h2>Treasure Output</h2>
        <p style="text-align:center;">Enter a level and party size, then click the button.</p>
    </div>

    <script>
        const treasureByLevel = {
            1:  { total: 175,    currency: 40,     extraCurrency: 10,    permanent: [{ level: 2, count: 2 }, { level: 1, count: 2 }], consumables: [{ level: 2, count: 2 }, { level: 1, count: 3 }] },
            2:  { total: 300,    currency: 70,     extraCurrency: 18,    permanent: [{ level: 3, count: 2 }, { level: 2, count: 2 }], consumables: [{ level: 3, count: 2 }, { level: 2, count: 2 }, { level: 1, count: 2 }] },
            3:  { total: 500,    currency: 120,    extraCurrency: 30,    permanent: [{ level: 4, count: 2 }, { level: 3, count: 2 }], consumables: [{ level: 4, count: 2 }, { level: 3, count: 2 }, { level: 2, count: 2 }] },
            4:  { total: 850,    currency: 200,    extraCurrency: 50,    permanent: [{ level: 5, count: 2 }, { level: 4, count: 2 }], consumables: [{ level: 5, count: 2 }, { level: 4, count: 2 }, { level: 3, count: 2 }] },
            5:  { total: 1350,   currency: 320,    extraCurrency: 80,    permanent: [{ level: 6, count: 2 }, { level: 5, count: 2 }], consumables: [{ level: 6, count: 2 }, { level: 5, count: 2 }, { level: 4, count: 2 }] },
            6:  { total: 2000,   currency: 500,    extraCurrency: 125,   permanent: [{ level: 7, count: 2 }, { level: 6, count: 2 }], consumables: [{ level: 7, count: 2 }, { level: 6, count: 2 }, { level: 5, count: 2 }] },
            7:  { total: 2900,   currency: 720,    extraCurrency: 180,   permanent: [{ level: 8, count: 2 }, { level: 7, count: 2 }], consumables: [{ level: 8, count: 2 }, { level: 7, count: 2 }, { level: 6, count: 2 }] },
            8:  { total: 4000,   currency: 1000,   extraCurrency: 250,   permanent: [{ level: 9, count: 2 }, { level: 8, count: 2 }], consumables: [{ level: 9, count: 2 }, { level: 8, count: 2 }, { level: 7, count: 2 }] },
            9:  { total: 5700,   currency: 1400,   extraCurrency: 350,   permanent: [{ level: 10, count: 2 }, { level: 9, count: 2 }], consumables: [{ level: 10, count: 2 }, { level: 9, count: 2 }, { level: 8, count: 2 }] },
            10: { total: 8000,   currency: 2000,   extraCurrency: 500,   permanent: [{ level: 11, count: 2 }, { level: 10, count: 2 }], consumables: [{ level: 11, count: 2 }, { level: 10, count: 2 }, { level: 9, count: 2 }] },
            11: { total: 11500,  currency: 2800,   extraCurrency: 700,   permanent: [{ level: 12, count: 2 }, { level: 11, count: 2 }], consumables: [{ level: 12, count: 2 }, { level: 11, count: 2 }, { level: 10, count: 2 }] },
            12: { total: 16500,  currency: 4000,   extraCurrency: 1000,  permanent: [{ level: 13, count: 2 }, { level: 12, count: 2 }], consumables: [{ level: 13, count: 2 }, { level: 12, count: 2 }, { level: 11, count: 2 }] },
            13: { total: 25000,  currency: 6000,   extraCurrency: 1500,  permanent: [{ level: 14, count: 2 }, { level: 13, count: 2 }], consumables: [{ level: 14, count: 2 }, { level: 13, count: 2 }, { level: 12, count: 2 }] },
            14: { total: 36500,  currency: 9000,   extraCurrency: 2250,  permanent: [{ level: 15, count: 2 }, { level: 14, count: 2 }], consumables: [{ level: 15, count: 2 }, { level: 14, count: 2 }, { level: 13, count: 2 }] },
            15: { total: 54500,  currency: 13000,  extraCurrency: 3250,  permanent: [{ level: 16, count: 2 }, { level: 15, count: 2 }], consumables: [{ level: 16, count: 2 }, { level: 15, count: 2 }, { level: 14, count: 2 }] },
            16: { total: 82500,  currency: 20000,  extraCurrency: 5000,  permanent: [{ level: 17, count: 2 }, { level: 16, count: 2 }], consumables: [{ level: 17, count: 2 }, { level: 16, count: 2 }, { level: 15, count: 2 }] },
            17: { total: 128000, currency: 30000,  extraCurrency: 7500,  permanent: [{ level: 18, count: 2 }, { level: 17, count: 2 }], consumables: [{ level: 18, count: 2 }, { level: 17, count: 2 }, { level: 16, count: 2 }] },
            18: { total: 208000, currency: 48000,  extraCurrency: 12000, permanent: [{ level: 19, count: 2 }, { level: 18, count: 2 }], consumables: [{ level: 19, count: 2 }, { level: 18, count: 2 }, { level: 17, count: 2 }] },
            19: { total: 355000, currency: 80000,  extraCurrency: 20000, permanent: [{ level: 20, count: 2 }, { level: 19, count: 2 }], consumables: [{ level: 20, count: 2 }, { level: 19, count: 2 }, { level: 18, count: 2 }] },
            20: { total: 490000, currency: 140000, extraCurrency: 35000, permanent: [{ level: 20, count: 4 }], consumables: [{ level: 20, count: 4 }, { level: 19, count: 2 }] }
        };

        function formatGp(value) {
            return `${value.toLocaleString()} gp`;
        }

        function cloneItems(items) {
            return items.map(item => ({ ...item }));
        }

        function scaleItems(baseItems, partySize) {
            const factor = partySize / 4;
            return baseItems
                .map(item => ({
                    level: item.level,
                    count: Math.max(1, Math.round(item.count * factor))
                }))
                .filter(item => item.count > 0);
        }

        function addExtraPartyItems(baseItems, partyLevel, extraCharacters, isConsumable = false) {
            const items = cloneItems(baseItems);

            for (let i = 0; i < extraCharacters; i++) {
                if (isConsumable) {
                    items.push({ level: partyLevel + 1 <= 20 ? partyLevel + 1 : 20, count: 1 });
                    items.push({ level: partyLevel, count: 1 });
                } else {
                    items.push({ level: partyLevel + 1 <= 20 ? partyLevel + 1 : 20, count: 1 });
                }
            }

            return combineSameLevel(items);
        }

        function combineSameLevel(items) {
            const map = {};
            for (const item of items) {
                map[item.level] = (map[item.level] || 0) + item.count;
            }
            return Object.keys(map)
                .map(level => ({ level: Number(level), count: map[level] }))
                .sort((a, b) => b.level - a.level);
        }

        function itemListHtml(items, label) {
            return `
                <li><strong>${label}</strong>
                    <ul>
                        ${items.map(item => `<li>${item.count} × level ${item.level} item${item.count > 1 ? 's' : ''}</li>`).join('')}
                    </ul>
                </li>
            `;
        }

        function generateTreasure() {
            const level = Number(document.getElementById('party-level').value);
            const partySize = Number(document.getElementById('party-size').value);
            const output = document.getElementById('treasure-output');

            if (!Number.isInteger(level) || level < 1 || level > 20) {
                output.innerHTML = '<h2>Treasure Output</h2><p>Please enter a party level from 1 to 20.</p>';
                return;
            }

            if (!Number.isInteger(partySize) || partySize < 1 || partySize > 8) {
                output.innerHTML = '<h2>Treasure Output</h2><p>Please enter a party size from 1 to 8.</p>';
                return;
            }

            const base = treasureByLevel[level];

            let totalValue = base.total;
            let currency = base.currency;
            let permanentItems = cloneItems(base.permanent);
            let consumables = cloneItems(base.consumables);

            if (partySize > 4) {
                const extras = partySize - 4;
                totalValue += base.extraCurrency * extras;
                currency += base.extraCurrency * extras;
                permanentItems = addExtraPartyItems(permanentItems, level, extras, false);
                consumables = addExtraPartyItems(consumables, level, extras, true);
            } else if (partySize < 4) {
                const factor = partySize / 4;
                totalValue = Math.round(base.total * factor);
                currency = Math.round(base.currency * factor);
                permanentItems = scaleItems(permanentItems, partySize);
                consumables = scaleItems(consumables, partySize);
            }

            const treasureHoards = [
                "a lacquered coffer of mixed coin and semiprecious stones",
                "a stained ironbound chest packed with loose currency and trade bars",
                "silk-wrapped art objects and jewelry in a carved cedar case",
                "a hidden cache of gemstones, promissory notes, and temple offerings",
                "a warlord’s lockbox of trophies, coin, and stamped ingots",
                "an old adventurer’s stash of pouches, rings, and sealed tubes"
            ];

            const randomHoard = treasureHoards[Math.floor(Math.random() * treasureHoards.length)];

            output.innerHTML = `
                <h2>Treasure Output</h2>
                <p><strong>Party Level:</strong> ${level}<br>
                <strong>Party Size:</strong> ${partySize}</p>

                <p><strong>Total Treasure Budget:</strong> ${formatGp(totalValue)}</p>
                <p><strong>Currency / valuables:</strong> ${formatGp(currency)}</p>
                <p><strong>Suggested hoard style:</strong> ${randomHoard}</p>

                <ul>
                    ${itemListHtml(permanentItems, 'Permanent Items')}
                    ${itemListHtml(consumables, 'Consumables')}
                </ul>

                <p><em>GM note:</em> This uses the official party-treasure-by-level table for four PCs, applies the listed extra rewards for parties above four, and uses a practical proportional reduction for smaller parties.</p>
            `;
        }

        document.getElementById('generate-btn').addEventListener('click', generateTreasure);
    </script>
</body>
</html>
