            cursor: pointer;

        // Sample XML data for other name format
        const otherNameXmlData = `
        <names>
            <firstNames>
		<name>Heart and</name>
                <name>House and</name>
		<name>Hawk and</name>
                <name>Pike and</name>
                <name>Cutlass and</name>
                <name>Glass and</name>
                <name>Blade and</name>
		<name>Plough and</name>
                <name>Bull and</name>
		<name>Ram and</name>
		<name>Lion and</name>

            </firstNames>
            <lastNames>
                <name>King</name>

                <name>Queen</name>

		<name>Ghast</name>
		<name>Grave</name>
		<name>Glaive</name>
            </lastNames>
        </names>
        `;

        // Function to parse XML and generate a random full name
        function generateRandomFullName() {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(fullNameXmlData, "text/xml");

            const firstNames = Array.from(xmlDoc.getElementsByTagName('firstNames')[0].getElementsByTagName('name')).map(node => node.textContent);
            const middleNames = Array.from(xmlDoc.getElementsByTagName('middleNames')[0].getElementsByTagName('name')).map(node => node.textContent);
            const lastNames = Array.from(xmlDoc.getElementsByTagName('lastNames')[0].getElementsByTagName('name')).map(node => node.textContent);

            const randomFirst = firstNames[Math.floor(Math.random() * firstNames.length)];
            const randomMiddle = middleNames[Math.floor(Math.random() * middleNames.length)];
            const randomLast = lastNames[Math.floor(Math.random() * lastNames.length)];

            return `The ${randomFirst} ${randomMiddle} ${randomLast}`;
        }

        // Function to parse XML and generate a random simple name
        function generateRandomSimpleName() {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(simpleNameXmlData, "text/xml");

            const firstNames = Array.from(xmlDoc.getElementsByTagName('firstNames')[0].getElementsByTagName('name')).map(node => node.textContent);
            const lastNames = Array.from(xmlDoc.getElementsByTagName('lastNames')[0].getElementsByTagName('name')).map(node => node.textContent);

            const randomFirst = firstNames[Math.floor(Math.random() * firstNames.length)];
            const randomLast = lastNames[Math.floor(Math.random() * lastNames.length)];

            return `The ${randomFirst} ${randomLast}`;
        }

        // Function to parse XML and generate a random name in the "other" format
        function generateRandomOtherName() {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(otherNameXmlData, "text/xml");

            const firstNames = Array.from(xmlDoc.getElementsByTagName('firstNames')[0].getElementsByTagName('name')).map(node => node.textContent);
            const lastNames = Array.from(xmlDoc.getElementsByTagName('lastNames')[0].getElementsByTagName('name')).map(node => node.textContent);

            const randomFirst = firstNames[Math.floor(Math.random() * firstNames.length)];
            const randomLast = lastNames[Math.floor(Math.random() * lastNames.length)];

            return `The ${randomFirst} ${randomLast}`;
        }

        // Function to generate a random name, alternating between full and simple names
        function generateRandomName() {
            const includeMiddleName = Math.floor(Math.random() * 4) + 1;
            if (includeMiddleName === 1 || includeMiddleName === 2) {
                return generateRandomOtherName();
            } else if (includeMiddleName === 3) {
                return generateRandomSimpleName();
            } else {
                return generateRandomFullName();
            }
        }

        // Add event listener to button
        document.getElementById('generate-btn').addEventListener('click', () => {
            const name = generateRandomName();
            document.getElementById('random-name').textContent = name;
        });
    </script>
</body>
</html>
