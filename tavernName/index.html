<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tavern Name Generator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            text-align: center;
        }

        a {
            display: inline-block;
            margin-bottom: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        #generate-btn {
            padding: 12px 24px;
            font-size: 18px;
            cursor: pointer;
        }

        #random-name {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <a href="../">⬅ Back to Main Menu</a>

    <h1>Tavern Name Generator</h1>
    
    <button id="generate-btn">Generate Random Name</button>

    <p id="random-name">Click the button to generate a name</p>

    <script>
        const fullNameXmlData = `
        <names>
            <firstNames>
                <name>Red</name>
                <name>Black</name>
                <name>White</name>
                <name>Green</name>
                <name>Silver</name>
                <name>Gold</name>
                <name>Golden</name>
                <name>Blue</name>
                <name>Flying</name>
                <name>Swimming</name>
                <name>Fractured</name>
                <name>Oaken</name>
                <name>Drunken</name>
                <name>Savage</name>
                <name>Maned</name>
                <name>Bladed</name>
                <name>Flaming</name>
            </firstNames>

            <middleNames>
                <name>Barrel</name>
                <name>Dragon</name>
                <name>Wyvern</name>
                <name>Dwarf</name>
                <name>Wyrm</name>
                <name>Giant</name>
                <name>Wolf</name>
                <name>Pirate</name>
                <name>Lion</name>
                <name>Mask</name>
                <name>Skull</name>
                <name>Veil</name>
                <name>Arrow</name>
                <name>Sword</name>
                <name>Shield</name>
                <name>Spear</name>
                <name>Eagle</name>
                <name>Stag</name>
                <name>Hound</name>
                <name>Horse</name>
                <name>Dryad</name>
                <name>Orc</name>
                <name>Fox</name>
                <name>Otter</name>
            </middleNames>

            <lastNames>
                <name>Inn</name>
                <name>Tavern</name>
                <name>Wayhouse</name>
                <name>Meadhall</name>
                <name>Bar</name>
                <name>Rest</name>
                <name>Meadery</name>
                <name>Pub</name>
                <name>Alehouse</name>
                <name>Haven</name>
                <name>Crossroads</name>
                <name>Glade</name>
            </lastNames>
        </names>
        `;

        const simpleNameXmlData = `
        <names>
            <firstNames>
                <name>Rearward</name>
                <name>Grinning</name>
                <name>Glassy</name>
                <name>Blackwood</name>
                <name>Misty</name>
                <name>Wayward</name>
                <name>Opal</name>
                <name>Cavernous</name>
                <name>Ghostly</name>
                <name>Hallowed</name>
                <name>Long</name>
                <name>Shadowed</name>
                <name>Gilded</name>
                <name>Mystic</name>
                <name>Starlit</name>
                <name>Ancient</name>
                <name>Whimsical</name>
                <name>Frosty</name>
                <name>Crimson</name>
                <name>Stout</name>
            </firstNames>

            <lastNames>
                <name>Mask</name>
                <name>Skull</name>
                <name>Veil</name>
                <name>Sailor</name>
                <name>Arrow</name>
                <name>Sword</name>
                <name>Shield</name>
                <name>Spear</name>
                <name>Northstar</name>
                <name>Dagger</name>
                <name>Warrior</name>
                <name>Eagle</name>
                <name>Blacksmith</name>
            </lastNames>
        </names>
        `;

        const otherNameXmlData = `
        <names>
            <firstNames>
                <name>Heart and</name>
                <name>House and</name>
                <name>Hawk and</name>
                <name>Pike and</name>
                <name>Cutlass and</name>
                <name>Blade and</name>
                <name>Plough and</name>
                <name>Bull and</name>
                <name>Ram and</name>
                <name>Lion and</name>
                <name>Shadow and</name>
            </firstNames>

            <lastNames>
                <name>King</name>
                <name>Queen</name>
                <name>Rose</name>
                <name>Thistle</name>
                <name>Wind</name>
                <name>Shield</name>
                <name>Sword</name>
                <name>Spear</name>
                <name>Eagle</name>
                <name>Anvil</name>
                <name>Warrior</name>
                <name>Grave</name>
            </lastNames>
        </names>
        `;

        function getRandom(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function parseXML(xmlString, tag) {
            const parser = new DOMParser();
            const xml = parser.parseFromString(xmlString, "text/xml");
            return Array.from(xml.getElementsByTagName(tag)[0].getElementsByTagName('name'))
                .map(n => n.textContent);
        }

        function generateRandomFullName() {
            const first = parseXML(fullNameXmlData, 'firstNames');
            const middle = parseXML(fullNameXmlData, 'middleNames');
            const last = parseXML(fullNameXmlData, 'lastNames');
            return `The ${getRandom(first)} ${getRandom(middle)} ${getRandom(last)}`;
        }

        function generateRandomSimpleName() {
            const first = parseXML(simpleNameXmlData, 'firstNames');
            const last = parseXML(simpleNameXmlData, 'lastNames');
            return `The ${getRandom(first)} ${getRandom(last)}`;
        }

        function generateRandomOtherName() {
            const first = parseXML(otherNameXmlData, 'firstNames');
            const last = parseXML(otherNameXmlData, 'lastNames');
            return `The ${getRandom(first)} ${getRandom(last)}`;
        }

        function generateRandomName() {
            const roll = Math.floor(Math.random() * 4);
            if (roll <= 1) return generateRandomOtherName();
            if (roll === 2) return generateRandomSimpleName();
            return generateRandomFullName();
        }

        document.getElementById('generate-btn').addEventListener('click', () => {
            document.getElementById('random-name').textContent = generateRandomName();
        });
    </script>

</body>
</html>
