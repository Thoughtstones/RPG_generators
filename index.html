        // Function to generate a random name
        function generateName(gender, race) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(namesXML, "application/xml");

            // Get first names
            const firstNames = xmlDoc.getElementsByTagName(race)[0]
                                     .getElementsByTagName('firstNames')[0]
                                     .getElementsByTagName(gender)[0]
                                     .getElementsByTagName('name');
            const randomFirstIndex = Math.floor(Math.random() * firstNames.length);
            const firstName = firstNames[randomFirstIndex].textContent;

            // Get second names
            const secondNames = xmlDoc.getElementsByTagName(race)[0]
                                      .getElementsByTagName('secondNames')[0]
                                      .getElementsByTagName('name');
            const randomSecondIndex = Math.floor(Math.random() * secondNames.length);
            const secondName = secondNames[randomSecondIndex].textContent;

            // Display the generated name
            document.getElementById('characterName').textContent = `${firstName} ${secondName}`;
        }
    </script>
